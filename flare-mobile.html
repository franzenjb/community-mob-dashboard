<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23C41E3A'/></svg>">
  <title>FLARE — Mobile</title>
  <link rel="stylesheet" href="https://js.arcgis.com/4.31/esri/themes/dark/main.css">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --red:  #C41E3A;
      --bg:   #0a0a0a;
      --bg2:  #141414;
      --dim:  #2e2e2e;
      --muted:#555;
      --text: #e8e8e8;
      --gap:  8px;
      --c0: #C41E3A;
      --c1: #00d4ff;
      --c2: #ff6b35;
      --c3: #a855f7;
      --c4: #f59e0b;
    }
    html, body { height: 100%; width: 100%; overflow: hidden;
      background: var(--bg); font-family: 'IBM Plex Mono', monospace; color: var(--text); }

    /* ── LAYOUT ── */
    #app { display: flex; flex-direction: column; height: 100%; }

    /* ── HEADER ── */
    #mob-header {
      height: 44px; flex-shrink: 0;
      background: var(--red);
      display: flex; align-items: center; padding: 0 14px; gap: 10px;
      z-index: 50;
    }
    #mob-header-title { font-size: 16px; font-weight: 700; letter-spacing: 0.05em; color: #fff; }
    #mob-header-badge {
      font-size: 9px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase;
      background: rgba(0,0,0,0.25); color: rgba(255,255,255,0.85);
      padding: 2px 8px; border-radius: 2px;
    }
    #mob-kpi {
      margin-left: auto; font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.9);
      letter-spacing: 0.05em;
    }

    /* ── MAP ── */
    #map-wrap { flex: 1; position: relative; min-height: 0; }
    #viewDiv  { width: 100%; height: 100%; }

    /* ── LOADING ── */
    .loading-overlay {
      position: absolute; inset: 0; background: rgba(10,10,10,0.92);
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; z-index: 200; gap: 14px;
    }
    .loading-overlay.hidden { display: none; }
    .spinner {
      width: 32px; height: 32px; border: 3px solid #333;
      border-top-color: var(--red); border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-msg { font-size: 12px; color: #666; letter-spacing: 0.1em; text-transform: uppercase; }

    /* ── TRAY ── */
    #tray {
      height: 22vh; min-height: 140px; max-height: 200px;
      display: flex; flex-direction: column;
      padding: 6px var(--gap) var(--gap); gap: 6px;
      flex-shrink: 0; border-top: 1px solid var(--dim);
      position: relative;
      transition: height 0.28s cubic-bezier(0.4,0,0.2,1),
                  min-height 0.28s cubic-bezier(0.4,0,0.2,1),
                  padding 0.28s cubic-bezier(0.4,0,0.2,1);
    }
    #tray.collapsed {
      height: 0; min-height: 0; padding: 0;
      overflow: hidden;
    }

    /* ── COLLAPSE HANDLE — tab sticking out of top-right of tray ── */
    #tray-handle {
      position: absolute;
      top: -22px; right: 12px;
      width: 48px; height: 22px;
      background: var(--bg2);
      border: 1px solid var(--dim);
      border-bottom: none;
      border-radius: 4px 4px 0 0;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; z-index: 10;
      font-family: inherit; font-size: 11px; font-weight: 700;
      color: var(--muted); letter-spacing: 0.05em;
      -webkit-tap-highlight-color: transparent;
      transition: color 0.1s, border-color 0.1s, background 0.1s;
    }
    #tray-handle:hover { color: var(--text); border-color: #555; background: #1c1c1c; }
    #tray-handle:active { background: #222; }
    #tray.collapsed #tray-handle {
      top: -22px; /* stays visible above collapsed tray */
      border-bottom: 1px solid var(--dim);
      border-radius: 4px 4px 0 0;
    }

    /* ── TRAY HEADER ── */
    #tray-header {
      display: flex; align-items: center; gap: var(--gap); flex-shrink: 0; height: 26px;
    }
    .hdr-btn {
      font-family: inherit; font-size: 10px; font-weight: 700; letter-spacing: 0.15em;
      text-transform: uppercase; color: var(--muted); background: none;
      border: 1px solid var(--dim); padding: 0 12px; height: 100%;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      transition: color 0.1s, border-color 0.1s;
    }
    .hdr-btn:active { color: var(--text); border-color: var(--text); }
    #depth-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--muted); text-align: center; flex: 1; transition: color 0.25s;
    }

    /* ── GRID ── */
    #grid-viewport { flex: 1; overflow: hidden; min-height: 0; }
    #grid-track {
      display: flex; width: 500%; height: 100%;
      transition: transform 0.22s cubic-bezier(0.4,0,0.2,1);
    }
    .layer-grid {
      width: 20%; height: 100%; flex-shrink: 0;
      display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr);
      gap: 5px;
    }
    .btn {
      font-family: inherit; font-size: 10px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      background: var(--bg2); border: 1px solid var(--dim); color: var(--muted);
      cursor: pointer; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 2px;
      padding: 4px; line-height: 1.2; -webkit-tap-highlight-color: transparent;
      transition: background 0.1s, color 0.1s, border-color 0.1s;
      user-select: none;
    }
    .btn:active:not(:disabled) { background: #1e1e1e; }
    .btn.content { border-color: var(--layer-color); color: var(--layer-color); }
    .btn.content.on {
      background: color-mix(in srgb, var(--layer-color) 12%, var(--bg2));
      box-shadow: inset 0 0 0 1px var(--layer-color);
    }
    .btn.content:active { background: color-mix(in srgb, var(--layer-color) 18%, var(--bg2)); }
    .btn-sub { font-size: 7px; font-weight: 500; letter-spacing: 0.05em; color: var(--muted); }
    .btn.map-btn { border-color: var(--dim); color: var(--text); background: #181818; font-size: 11px; }
    .btn.nav { font-size: 20px; letter-spacing: 0; color: var(--text); background: #1e1e1e; border-color: #666; }
    .btn.nav:not(:disabled):active { background: #2a2a2a; }
    .btn.nav:disabled { opacity: 0.15; cursor: default; }

    /* ── TOAST ── */
    #toast {
      position: fixed; bottom: calc(22vh + 8px); left: 50%; transform: translateX(-50%);
      background: rgba(20,20,20,0.95); border: 1px solid var(--dim);
      color: var(--text); font-size: 10px; font-weight: 700; letter-spacing: 0.15em;
      text-transform: uppercase; padding: 6px 16px; z-index: 300;
      opacity: 0; transition: opacity 0.2s; pointer-events: none; white-space: nowrap;
    }
    #toast.show { opacity: 1; }

    /* Hidden desktop controls — needed by original JS event listeners */
    #desktop-controls { display: none; }
  
    /* ── TRAY HANDLE BAR — always visible between map and tray ── */
    #tray-handle {
      flex-shrink: 0; width: 100%; height: 28px;
      background: var(--bg2); border-top: 1px solid var(--dim); border-bottom: none;
      display: flex; align-items: center; justify-content: flex-end;
      padding-right: 14px; gap: 6px;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      font-family: inherit; font-size: 10px; font-weight: 700;
      letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--muted); user-select: none;
      transition: background 0.15s, color 0.15s;
    }
    #tray-handle:active { background: #1c1c1c; }
    #tray-handle.open-state {
      background: #1a1a1a; border-top-color: #555;
      color: var(--text); font-size: 11px; letter-spacing: 0.2em;
      justify-content: center;
    }
    #tray { transition: height 0.28s cubic-bezier(0.4,0,0.2,1),
                        min-height 0.28s cubic-bezier(0.4,0,0.2,1),
                        padding 0.28s cubic-bezier(0.4,0,0.2,1); }
    #tray.collapsed { height: 0 !important; min-height: 0 !important; padding: 0 !important; overflow: hidden; }
  </style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <div id="mob-header">
    <span id="mob-header-title">FLARE</span>
    <span id="mob-header-badge">Mobile</span>
    <span id="mob-kpi">— incidents</span>
  </div>

  <!-- MAP -->
  <div id="map-wrap">
    <div id="viewDiv"></div>
    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner"></div>
      <div class="loading-msg">Loading FLARE</div>
    </div>
  </div>

  <!-- TRAY HANDLE — always visible, never inside collapsing tray -->
  <button id="tray-handle" onclick="toggleTray()"><span id="tray-handle-text">▼ MENU</span></button>

  <!-- TRAY -->
  <div id="tray">
    <div id="tray-header">
      <button class="hdr-btn" onclick="showHelp()">?</button>
      <div id="depth-label">INCIDENTS</div>
      <button class="hdr-btn" onclick="mobileClearAll()">RESET</button>
    </div>
    <div id="grid-viewport">
      <div id="grid-track"><!-- built by JS --></div>
    </div>
  </div>

</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- Hidden desktop controls (original JS binds to these) -->
<div id="desktop-controls">
  <input type="checkbox" id="cb-with">
  <input type="checkbox" id="cb-without">
  <input type="checkbox" id="cb-stations">
  <input type="checkbox" id="cb-depts">
  <input type="checkbox" id="cb-div" checked>
  <input type="checkbox" id="cb-reg">
  <input type="checkbox" id="cb-chap">
  <input type="checkbox" id="cb-svi">
  <input type="checkbox" id="cb-nri">
  <!-- Stubs the original JS needs to not throw -->
  <div id="kpiBar"></div>
  <div id="left-wrap"></div>
  <select id="sel-division"><option value="">All</option></select>
  <select id="sel-region"><option value="">All</option></select>
  <select id="sel-chapter"><option value="">All</option></select>
  <input id="station-search" type="text">
  <div id="dept-results"></div>
  <div id="dept-chips"></div>
  <div id="filter-count"></div>
  <div id="sidebar-right"></div>
  <div id="sr-body"></div>
  <!-- Additional stubs for JS event listeners -->
  <button id="btn-clear"></button>
  <button id="acc-layers-btn"></button>
  <button id="left-tab"></button>
  <button id="close-right"></button>
  <div id="acc-layers-body"></div>
  <div id="acc-layers-arrow"></div>
  <div id="svi-zoom-badge"></div>
  <div id="nri-zoom-badge"></div>
  <select id="dept-min-stations"><option value="0">0</option></select>
  <select id="dept-min-ff"><option value="0">0</option></select>
  <div id="loadingMsg"></div>
  <div id="help-modal" style="display:none"></div>
</div>

<script src="https://js.arcgis.com/4.31/"></script>
<script>
require([
  "esri/Map",
  "esri/views/MapView",
  "esri/layers/FeatureLayer",
  "esri/renderers/UniqueValueRenderer",
  "esri/renderers/ClassBreaksRenderer",
  "esri/symbols/SimpleMarkerSymbol",
  "esri/symbols/PictureMarkerSymbol",
  "esri/symbols/SimpleFillSymbol",
  "esri/widgets/Home",
  "esri/widgets/ScaleBar",
  "esri/widgets/Expand",
  "esri/widgets/Legend",
  "esri/PopupTemplate",
  "esri/core/reactiveUtils"
], function(
  Map, MapView, FeatureLayer,
  UniqueValueRenderer, ClassBreaksRenderer,
  SimpleMarkerSymbol, SimpleFillSymbol, PictureMarkerSymbol,
  Home, ScaleBar, Expand, Legend, PopupTemplate, reactiveUtils
) {

  // ── MOBILE SCOPE BRIDGE — exposes closure vars to external scripts ──
  window._flare = function(key) {
    var scope = {
      view:          function(){ return _view; },
      stationsLayer: function(){ return _stationsLayer; },
      deptsLayer:    function(){ return _deptsLayer; },
      sviLayer:      function(){ return _sviLayer; },
      nriLayer:      function(){ return _nriLayer; },
      boundaryLayers:function(){ return _boundaryLayers; }
    };
    return scope[key] ? scope[key]() : null;
  };

  // ═══════════════════════════════════════════════════════════
  // CONFIG
  // ═══════════════════════════════════════════════════════════
  var PORTAL     = "https://arc-nhq-gis.maps.arcgis.com";
  var FLARE_ITEM = "3c225e4e9c344c7bb5424acf1adfb982";

  // Reference layer URLs (from tract-profile-2)
  var SVI_URL      = "https://onemap.cdc.gov/onemapservices/rest/services/SVI/CDC_ATSDR_Social_Vulnerability_Index_2022_USA/FeatureServer/8";
  var NRI_URL      = "https://services.arcgis.com/XG15cJAlne2vxtgt/arcgis/rest/services/National_Risk_Index_Census_Tracts/FeatureServer/0";
  var DEPARTMENTS_URL = "https://services.arcgis.com/pGfbNJoYypmNq86F/arcgis/rest/services/NERIS_Fire_Departments_RC_Enriched/FeatureServer/0";
  var STATIONS_URL    = "https://services.arcgis.com/pGfbNJoYypmNq86F/arcgis/rest/services/NERIS_Fire_Stations_RC_Enriched/FeatureServer/0";
  var COLOR_WITH    = '#22c55e';  // green — Fire WITH RC Notification
  var COLOR_WITHOUT = '#ef4444';  // red   — Fire WITHOUT RC Notification

  // ARC Geography boundaries (from chapter-view)
  var ARC_GEO_BASE = "https://services.arcgis.com/pGfbNJoYypmNq86F/arcgis/rest/services/Master_ARC_Geography_2022/FeatureServer";
  var BOUNDARY_CONFIGS = [
    { id:'div',  layerId:1, field:'Division', color:'#7B2D8E', width:2.0, minScale:0,       maxScale:0,       labelMinScale:25000000, labelMaxScale:3000000 },
    { id:'reg',  layerId:2, field:'Region',   color:'#2D6DB4', width:1.5, minScale:0,       maxScale:0,       labelMinScale:8000000,  labelMaxScale:800000  },
    { id:'chap', layerId:3, field:'Chapter',  color:'#C41E3A', width:1.2, minScale:5000000, maxScale:0,       labelMinScale:5000000,  labelMaxScale:0       }
  ];

  // Categories to merge: 'Fire with RC Care' rolls into 'Fire with RC Notification'
  var MERGE_INTO = {
    'FIRE WITH RC CARE':         'Fire with RC Notification',
    'FIRE WITH RC NOTIFICATION': 'Fire with RC Notification'   // normalize all-caps data variant
  };

  // Category colors: index 0..N for each unique master label value
  var CAT_COLORS = ["#E63950","#F59E0B","#10B981","#6366F1","#F97316","#06B6D4","#8B5CF6"];

  // Field candidates — tried in order, first match wins
  var FIELDS = {
    division:    ["Division","DIVISION","division_name","DivName","Div_Name","DIV_NAME","div_name"],
    region:      ["Region","REGION","region_name","RegionName","REG_NAME","reg_name"],
    chapter:     ["Chapter","CHAPTER","chapter_name","ChapterName","Chap_Name","CHAP_NAME"],
    county:      ["County","county","COUNTY","county_name","County_Name","COUNTY_NAME",
                  "cnty_name","cnty_nm","CNTY_NAME"],
    city:        ["IncidentCity","Incident_City","incident_city","inc_city",
                  "City","city","CITY","City_Name","city_name","CITY_NAME",
                  "Muni_Name","muni_name","Municipality","municipality","Place","place"],
    zip:         ["Zip","zip","ZIP","Zip_Code","zip_code","ZIP_CODE","ZipCode","PostalCode","postal_code"],
    state:       ["State","state","STATE","State_Name","state_name","STATE_NAME","Inc_State","IncState"],
    masterLabel: ["Master_Label","MasterLabel","master_label","masterLabel",   // confirmed
                  "Label","label","Category","category","IncidentType","incident_type","Type","type"],
    date:        ["Event_Date","event_date","EventDate","Alarm_Date","Alarm_Time","AlarmDateTime",  // confirmed
                  "incident_date","IncidentDate","AlarmDate","alarm_date","ReportedDate","Inc_Date"],
    address:     ["IncidentAddress","Incident_Address","incident_address","Inc_Address",
                  "Address","address","Full_Address","full_address","Street","street",
                  "Location","location","Street_Address","street_address"],
    fireDept:    ["FD_Name","fd_name","FireDepartment","fire_department","FireDept","fire_dept",
                  "DeptName","dept_name","Department","department","Agency","agency",
                  "AgencyName","agency_name","FDName","Fire_Department_Name","dept",
                  "Organization","organization","Org","org","Jurisdiction","jurisdiction",
                  "ResponsibleOrg","responsible_org","RespondingOrg","responding_org",
                  "FD_Jurisdiction","fd_jurisdiction","FireDept_Name","fire_dept_name",
                  "FD","fd","FDDesc","fd_desc","FireDepartmentName","fire_department_name"],
    casualties:  ["Casualties","casualties","Deaths","deaths","Fatalities","fatalities","Injuries","injuries"]
  };


  // ── NERIS service vocabularies (complete lists for greyed-out display) ──────
  var ALL_FIRE_SERVICES = ["ANIMAL TECHRESCUE","ARFF FIREFIGHTING","CAUSE ORIGIN","CAVE SAR","COLLAPSE RESCUE","CONFINED SPACE","DIVE SAR","FLOOD SAR","HAZMAT OPS","HAZMAT TECHNICIAN","HELO SAR","HIGHRISE FIREFIGHTING","ICE RESCUE","MACHINERY RESCUE","MARINE FIREFIGHTING","MINE SAR","PETROCHEM FIREFIGHTING","REHABILITATION","ROPE RESCUE","RRD EXISTING","RRD NEWCONST","RRD PLANS","RRD PUBLICED","STRUCTURAL FIREFIGHTING","SURF RESCUE","SWIFTWATER SAR","TOWER SAR","TRAINING DRIVER","TRAINING ELF","TRAINING OD","TRAINING VETFF","TRENCH RESCUE","VEHICLE RESCUE","WATER SAR","WATERCRAFT RESCUE","WILDERNESS SAR","WILDLAND FIREFIGHTING"];
  var ALL_EMS_SERVICES  = ["AERO TRANSPORT","ALS NO TRANSPORT","ALS TRANSPORT","BLS NO TRANSPORT","BLS TRANSPORT","COMMUNITY MED","NO MEDICAL"];
  var ALL_INV_SERVICES  = ["COMPANY LEVEL","DEDICATED","K9 DETECT","LAW ENFORCEMENT","YOUTH FIRESETTER"];


  // Renders a two-column alphabetical grid: active items colored, inactive greyed
  function serviceGrid(activeStr, allList, activeColor, activeBg, activeBorder) {
    var active = new Set((activeStr||'').split(',').map(function(s){ return s.trim(); }).filter(Boolean));
    var h = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:3px 6px;margin-bottom:8px">';
    allList.forEach(function(item) {
      var on = active.has(item);
      h += '<div style="font-size:9.5px;padding:3px 6px;border-radius:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;' +
        (on
          ? 'background:'+activeBg+';border:1px solid '+activeBorder+';color:'+activeColor+';font-weight:600'
          : 'background:#f5f5f5;border:1px solid #e8e8e8;color:#ccc') +
        '" title="'+item+'">' + item + '</div>';
    });
    h += '</div>';
    return h;
  }

  // ═══════════════════════════════════════════════════════════
  // STATE
  // ═══════════════════════════════════════════════════════════
  var _flareLayer      = null;
  var _fieldMap        = {};
  var _categories      = [];
  var _catColorMap     = {};
  var _activeFilter    = { division:'', region:'', chapter:'' };
  var _sviLayer        = null;
  var _nriLayer        = null;
  var _stationsLayer   = null;   // FeatureLayer — 62,449 stations
  var _deptsLayer      = null;   // FeatureLayer — 30,687 dept HQ points
  var _view            = null;
  var _kpiTotal        = 0;
  var _showWith        = false;
  var _showWithout     = false;
  var _deptSearch      = '';
  var _boundaryLayers  = {};   // id → FeatureLayer (div, reg, chap)

  // Filter key → boundary layer id (auto-enable on select)
  var FILTER_TO_BOUNDARY = { division:'div', region:'reg', chapter:'chap' };

  // Popup style picker
  var _popupStyle   = 'A';
  var _lastStAttrs  = null;   // last station click attributes (for re-render on style switch)
  var _lastDeptAttrs = null;  // async dept data loaded for last station

  // US state abbreviation → full name
  var STATE_NAMES = {AL:'Alabama',AK:'Alaska',AZ:'Arizona',AR:'Arkansas',CA:'California',CO:'Colorado',CT:'Connecticut',DE:'Delaware',FL:'Florida',GA:'Georgia',HI:'Hawaii',ID:'Idaho',IL:'Illinois',IN:'Indiana',IA:'Iowa',KS:'Kansas',KY:'Kentucky',LA:'Louisiana',ME:'Maine',MD:'Maryland',MA:'Massachusetts',MI:'Michigan',MN:'Minnesota',MS:'Mississippi',MO:'Missouri',MT:'Montana',NE:'Nebraska',NV:'Nevada',NH:'New Hampshire',NJ:'New Jersey',NM:'New Mexico',NY:'New York',NC:'North Carolina',ND:'North Dakota',OH:'Ohio',OK:'Oklahoma',OR:'Oregon',PA:'Pennsylvania',RI:'Rhode Island',SC:'South Carolina',SD:'South Dakota',TN:'Tennessee',TX:'Texas',UT:'Utah',VT:'Vermont',VA:'Virginia',WA:'Washington',WV:'West Virginia',WI:'Wisconsin',WY:'Wyoming',DC:'Washington D.C.',PR:'Puerto Rico'};
  function stFull(code){ return STATE_NAMES[String(code||'').trim().toUpperCase()] || code || ''; }

  // ═══════════════════════════════════════════════════════════
  // DOM
  // ═══════════════════════════════════════════════════════════
  var $ = function(id) { return document.getElementById(id); };
  var loadingOverlay = $('loadingOverlay');
  var loadingMsg     = $('loadingMsg');
  var kpiBar         = $('kpiBar');
  var kpiTotal       = $('kpi-total');
  var btnClear       = $('btn-clear');
  var selDivision    = $('sel-division');
  var selRegion      = $('sel-region');
  var selChapter     = $('sel-chapter');

  // ── Cascade chain — order matters ───────────────────────────────────
  var FILTER_CHAIN = [
    { key:'division', label:'Division', sel:null },
    { key:'region',   label:'Region',   sel:null },
    { key:'chapter',  label:'Chapter',  sel:null }
  ];
  function wireChain() {
    FILTER_CHAIN[0].sel = selDivision;
    FILTER_CHAIN[1].sel = selRegion;
    FILTER_CHAIN[2].sel = selChapter;
    FILTER_CHAIN.forEach(function(item, idx) {
      item.sel.addEventListener('change', function() { onChainChange(idx); });
    });
  }

  function setMsg(t) { loadingMsg.textContent = t; loadingOverlay.classList.remove('hidden'); }
  function hideLoad() { loadingOverlay.classList.add('hidden'); }

  // ═══════════════════════════════════════════════════════════
  // FIELD RESOLUTION
  // ═══════════════════════════════════════════════════════════
  function resolveField(fields, key) {
    var names = fields.map(function(f){ return f.name; });
    var cands = FIELDS[key] || [];
    for (var i=0; i<cands.length; i++) {
      if (names.indexOf(cands[i]) !== -1) return cands[i];
    }
    // Case-insensitive partial fallback
    var kl = key.toLowerCase().replace(/[_\s]/g,'');
    for (var j=0; j<names.length; j++) {
      if (names[j].toLowerCase().replace(/[_\s]/g,'').indexOf(kl) !== -1) return names[j];
    }
    return null;
  }

  function alias(fieldName) {
    if (!fieldName || !_flareLayer) return fieldName || '';
    var f = _flareLayer.fields.find(function(x){ return x.name===fieldName; });
    return (f && f.alias) ? f.alias : fieldName;
  }

  // ═══════════════════════════════════════════════════════════
  // POPUP
  // ═══════════════════════════════════════════════════════════
  // Fields to suppress entirely from "Additional Details"
  var SUPPRESS_FIELDS = [
    /^(latitude|longitude|lat|lon|long|x|y|x_coord|y_coord|shape_x|shape_y)$/i,
    /^(fips|county_fips|geoid|census_tract|tract_fips|objectid|oid|globalid|created_|last_edit|esri_)$/i,
    /^svi[_\s]*risk$/i,  // catches SVI_Risk, SVI Risk, SVIRisk — shown in dedicated section
    /^svi$/i             // bare "SVI" field
  ];
  // Check both field name AND alias
  function isSuppressed(f) {
    var n = typeof f === 'string' ? f : f.name;
    var a = (f && f.alias) ? f.alias : '';
    return SUPPRESS_FIELDS.some(function(re){ return re.test(n) || re.test(a); });
  }

  function fmtVal(attrs, fieldName) {
    if (!fieldName) return null;
    var v = attrs[fieldName];
    if (v === null || v === undefined || String(v).trim() === '') return null;
    // Truncate lat/lon to 2 decimals for privacy
    if (/^(lat|latitude)$/i.test(fieldName) && typeof v === 'number')
      return v.toFixed(2) + '°N';
    if (/^(lon|long|longitude)$/i.test(fieldName) && typeof v === 'number')
      return v.toFixed(2) + '°W';
    // Format SVI as percentage
    if (/svi/i.test(fieldName) && typeof v === 'number' && v >= 0 && v <= 1)
      return Math.round(v * 100) + '%';
    // Format date/time timestamps
    if (typeof v === 'number' && v > 1000000000000) {
      var d = new Date(v);
      var datePart = d.toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'});
      var h = d.getHours(), m = d.getMinutes();
      var timePart = (h || m) ? ' ' + (h % 12 || 12) + ':' + (m < 10 ? '0'+m : m) + (h < 12 ? ' AM' : ' PM') : '';
      return datePart + timePart;
    }
    return String(v);
  }

  function popupField(label, value) {
    var val = value || '<span class="pop-field-value empty">—</span>';
    return '<div class="pop-field"><div class="pop-field-label">' + label +
           '</div><div class="pop-field-value">' + val + '</div></div>';
  }

  // SVI field name in the layer (confirmed from popup data)
  var SVI_LAYER_FIELD = 'SVI Risk';

  function buildPopupContent(feature) {
    var a = feature.graphic.attributes;
    var catVal   = _fieldMap.masterLabel ? (a[_fieldMap.masterLabel] || '') : '';
    var color    = _catColorMap[catVal] || '#888';
    var division = fmtVal(a, _fieldMap.division) || '';
    var chapter  = fmtVal(a, _fieldMap.chapter)  || '';
    var region   = fmtVal(a, _fieldMap.region)   || '';
    var county   = fmtVal(a, _fieldMap.county)   || '';
    var city     = fmtVal(a, _fieldMap.city)     || '';
    var zip      = fmtVal(a, _fieldMap.zip)      || '';
    var addr     = fmtVal(a, _fieldMap.address)  || '';
    var dt       = fmtVal(a, _fieldMap.date)      || '';
    var dept     = fmtVal(a, _fieldMap.fireDept)  || '';
    var cas      = fmtVal(a, _fieldMap.casualties) || '';
    var svi      = fmtVal(a, SVI_LAYER_FIELD)     || '';

    var locLine = [city, county ? county + ' Co.' : '', zip].filter(Boolean).join(', ');

    // Known field names/aliases — suppress these from "Additional Details"
    var knownNames = Object.values(_fieldMap).filter(Boolean);
    // Push all plausible SVI field name variants so none slip through
    ['SVI Risk','SVI_Risk','svi_risk','SVIRisk','SVI risk','svi risk',
     'RPL_THEMES','RPL_THEME1','RPL_THEME2','RPL_THEME3','RPL_THEME4',
     SVI_LAYER_FIELD].forEach(function(n){ knownNames.push(n); });

    var html = '<div class="pop-card">';

    // Colored header
    html += '<div class="pop-header" style="background:' + color + '">';
    html += '<div class="pop-title">' + (catVal || 'Fire Incident') + '</div>';
    if (locLine) html += '<div class="pop-subtitle">' + locLine + '</div>';
    html += '</div>';

    html += '<div class="pop-body">';

    // Address block
    if (addr) html += '<div class="pop-field" style="margin-bottom:10px">' +
      '<div class="pop-field-label">Address</div>' +
      '<div class="pop-field-value">' + addr + '</div></div>';

    // Primary grid
    html += '<div class="pop-grid">';
    if (dept)     html += popupField('Fire Department', dept);
    if (dt)       html += popupField('Date / Time', dt);
    if (chapter)  html += popupField('Chapter', chapter);
    if (division) html += popupField('Division', division);
    if (region)   html += popupField('Region', region);
    if (county)   html += popupField('County', county);
    if (city)     html += popupField('City', city);
    if (zip)      html += popupField('ZIP', zip);
    if (cas)      html += popupField('Casualties', cas);
    html += '</div>';

    // SVI badge
    if (svi) {
      var sviNum = parseFloat(a[SVI_LAYER_FIELD]);
      var sviColor = sviNum >= 0.75 ? '#dc2626' : sviNum >= 0.5 ? '#f97316' : sviNum >= 0.25 ? '#f59e0b' : '#22c55e';
      html += '<div class="pop-section-title">Community Vulnerability</div>';
      html += '<div class="pop-grid">';
      html += '<div class="pop-field pop-full">' +
              '<div class="pop-field-label">Social Vulnerability Index</div>' +
              '<div class="pop-field-value" style="color:' + sviColor + ';font-size:15px">' + svi + '</div>' +
              '</div>';
      html += '</div>';
    }

    // Additional — skip coords, FIPS, known fields (check both name AND alias)
    var extras = _flareLayer.fields.filter(function(f) {
      return f.type !== 'oid' && f.type !== 'geometry' && f.type !== 'blob' &&
             knownNames.indexOf(f.name) === -1 && knownNames.indexOf(f.alias||'') === -1 &&
             !isSuppressed(f);
    }).map(function(f) {
      var v = fmtVal(a, f.name);
      return v ? { label: f.alias || f.name, value: v } : null;
    }).filter(Boolean);

    if (extras.length) {
      html += '<div class="pop-section-title">Additional Details</div>';
      html += '<div class="pop-grid">';
      extras.forEach(function(e) { html += popupField(e.label, e.value); });
      html += '</div>';
    }

    html += '</div></div>';
    return html;
  }


  // Green = WITH RC Notification, Red = WITHOUT RC Notification
  function catColor(label) {
    return String(label).toUpperCase().indexOf('WITHOUT') !== -1 ? COLOR_WITHOUT : COLOR_WITH;
  }

  // ═══════════════════════════════════════════════════════════
  // RENDERER
  // ═══════════════════════════════════════════════════════════
  function buildRenderer(fieldName, categories) {
    var merged = mergedCategories(categories);
    // Assign green/red per merged group
    merged.forEach(function(grp) {
      var c = catColor(grp.label);
      grp.values.forEach(function(v) { _catColorMap[v] = c; });
    });

    // Build raw-value → canonical group label so all merged values share the exact same label string
    var valToLabel = {};
    merged.forEach(function(grp) {
      grp.values.forEach(function(v) { valToLabel[v] = grp.label; });
    });

    // Build Arcade expression: normalize every raw value → its canonical group label.
    // This guarantees exactly ONE legend entry per merged group (no duplicates).
    var arcLines = ['var raw = $feature["' + fieldName + '"];'];
    Object.keys(valToLabel).forEach(function(rawVal) {
      var label = valToLabel[rawVal];
      if (rawVal !== label) {   // only emit lines for non-identity mappings
        arcLines.push(
          'if (Upper(raw) == "' + rawVal.toUpperCase().replace(/"/g, '\\"') +
          '") return "' + label.replace(/"/g, '\\"') + '";'
        );
      }
    });
    arcLines.push('return raw;');

    // One uniqueValueInfo per merged group → exactly one legend entry per group
    var infos = merged.map(function(grp) {
      var c = catColor(grp.label);
      return {
        value: grp.label,
        label: grp.label,
        symbol: new SimpleMarkerSymbol({
          style: 'circle', color: c, size: 8,
          outline: { color: [255,255,255,200], width: 1.2 }
        })
      };
    });

    return new UniqueValueRenderer({
      valueExpression: arcLines.join('\n'),
      uniqueValueInfos: infos
    });
  }

  // SVI class-breaks renderer (census tracts colored by RPL_THEMES)
  function buildSviRenderer() {
    var breaks = [
      [0, 0.25, '#fef9c3'],
      [0.25, 0.5, '#fde68a'],
      [0.5, 0.75, '#fb923c'],
      [0.75, 1.01, '#dc2626']
    ];
    return new ClassBreaksRenderer({
      field: 'RPL_THEMES',
      classBreakInfos: breaks.map(function(b) {
        return { minValue: b[0], maxValue: b[1],
          symbol: new SimpleFillSymbol({ color: b[2], outline: { color: [255,255,255,60], width: 0.3 } }),
          label: b[0] + '–' + b[1]
        };
      })
    });
  }

  // NRI class-breaks renderer (counties colored by RISK_SCORE)
  function buildNriRenderer() {
    var breaks = [
      [0, 20, '#dbeafe'],
      [20, 40, '#93c5fd'],
      [40, 60, '#6366f1'],
      [60, 80, '#4338ca'],
      [80, 200, '#1e1b4b']

    return new ClassBreaksRenderer({

      classBreakInfos: breaks.map(function(b) {

          label: b[0] + '–' + b[1]
        };
      })
    });
  }

  // ═══════════════════════════════════════════════════════════
  // KPI BAR
  // ═══════════════════════════════════════════════════════════
  // Collapse categories per MERGE_INTO rules → [{label, values[]}]
  // Fully case-insensitive: normalizes both source AND target keys
  function mergedCategories(rawCats) {
    var groupLabels = {};  // uppercased key → display label (canonical)
    var groupVals   = {};  // uppercased key → [raw values]
    var order       = [];  // uppercased keys in insertion order
    // Build normalized MERGE_INTO lookup
    var mergeUpper = {};
    Object.keys(MERGE_INTO).forEach(function(k) {
      mergeUpper[k.trim().toUpperCase()] = MERGE_INTO[k];
    });
    rawCats.forEach(function(cat) {
      var catUp  = String(cat).trim().toUpperCase();
      var target = mergeUpper[catUp] || cat;          // canonical label
      var tgtUp  = String(target).trim().toUpperCase(); // normalized key
      if (!groupVals[tgtUp]) {
        groupVals[tgtUp]   = [];
        groupLabels[tgtUp] = target;
        order.push(tgtUp);
      }
      groupVals[tgtUp].push(cat);
    });
    return order.map(function(k) {
      return { label: groupLabels[k], values: groupVals[k] };
    });
  }

  function buildKpiBar(categories) {
    kpiBar.querySelectorAll('.kpi-cat').forEach(function(el){ el.remove(); });
    var merged = mergedCategories(categories);

    merged.forEach(function(grp, i) {
      var c = catColor(grp.label);
      var tile = document.createElement('div');
      tile.className = 'kpi-tile kpi-cat';

      tile.innerHTML =
        '<div class="kpi-num-row"><div class="kpi-num dim" id="kpi-c' + i + '">—</div>' +
        '<div class="kpi-pct dim" id="kpi-pct' + i + '">—%</div></div>' +
        '<div class="kpi-lbl"><span class="kpi-dot" style="--kc:' + c + '"></span>' + grp.label + '</div>';
      kpiBar.appendChild(tile);
    });

    // Extra KPI: Fire Stations (filtered)
    var tStns = document.createElement('div');

    tStns.innerHTML = '<div class="kpi-num dim" id="kpi-stations">—</div><div class="kpi-lbl"><span style="display:inline-block;width:8px;height:8px;background:#111;border:1.5px solid #fbbf24;border-radius:1px;margin-right:4px;vertical-align:middle"></span>Fire Stations</div>';
    kpiBar.appendChild(tStns);

    var tDepts = document.createElement('div');
    tDepts.className = 'kpi-tile kpi-cat kpi-dept-tile';
    tDepts.style.cssText = '--kc:#fbbf24;display:none;border-left:2px solid rgba(251,191,36,0.3)';
    tDepts.innerHTML = '<div class="kpi-num dim" id="dkpi-depts">—</div><div class="kpi-lbl">Departments</div>';
    kpiBar.appendChild(tDepts);

    var tDStations = document.createElement('div');
    tDStations.className = 'kpi-tile kpi-cat kpi-dept-tile';
    tDStations.style.cssText = '--kc:#fbbf24;display:none';
    tDStations.innerHTML = '<div class="kpi-num dim" id="dkpi-stations">—</div><div class="kpi-lbl">Stations</div>';
    kpiBar.appendChild(tDStations);

    var tDUnits = document.createElement('div');
    tDUnits.className = 'kpi-tile kpi-cat kpi-dept-tile';
    tDUnits.style.cssText = '--kc:#fbbf24;display:none';
    tDUnits.innerHTML = '<div class="kpi-num dim" id="dkpi-units">—</div><div class="kpi-lbl">Apparatus</div>';
    kpiBar.appendChild(tDUnits);

    var tDFF = document.createElement('div');
    tDFF.className = 'kpi-tile kpi-cat kpi-dept-tile';
    tDFF.style.cssText = '--kc:#34d399;display:none';
    tDFF.innerHTML = '<div class="kpi-num dim" id="dkpi-ff">—</div><div class="kpi-lbl">Firefighters</div>';
    kpiBar.appendChild(tDFF);
  }

  function updateKpis() {
    var where = buildWhere();
    var layer = _flareLayer;
    if (!layer) return;

    // Query total first, then fire category queries so _kpiTotal is always available for %
    layer.queryFeatureCount({ where: where }).then(function(total) {
      _kpiTotal = total;
      kpiTotal.textContent = total.toLocaleString();
      kpiTotal.classList.remove('dim');

      // Per merged category group — fires after total is known
      var merged = mergedCategories(_categories);
      merged.forEach(function(grp, i) {
        var el = $('kpi-c' + i);
        if (!el || !_fieldMap.masterLabel) return;
        var vals = grp.values.map(function(v) {
          return _fieldMap.masterLabel + "='" + v.replace(/'/g,"''") + "'";
        }).join(' OR ');
        var catClause = grp.values.length > 1 ? '(' + vals + ')' : vals;
        var w = where === '1=1' ? catClause : where + ' AND ' + catClause;
        var pctEl = $('kpi-pct' + i);
        el.textContent = '—'; el.classList.add('dim');
        if (pctEl) { pctEl.textContent = ''; pctEl.classList.add('dim'); }
        layer.queryFeatureCount({ where: w }).then(function(n) {
          el.textContent = n.toLocaleString(); el.classList.remove('dim');
          if (pctEl) {
            pctEl.textContent = total > 0 ? Math.round(n / total * 100) + '%' : '';
            pctEl.classList.remove('dim');
          }
        }).catch(function(){});
      });
    }).catch(function(){});

    // Divisions represented
    var elS = $('kpi-states');
    var divField = _fieldMap.division || _fieldMap.state;
    if (elS && divField) {
      layer.queryFeatures({ where: where, outFields: [divField],
        returnDistinctValues: true, returnGeometry: false })
        .then(function(r) {
          elS.textContent = r.features.length; elS.classList.remove('dim');
        }).catch(function(){});
    }

    // Chapters engaged
    var elC = $('kpi-chaps');
    if (elC && _fieldMap.chapter) {
      layer.queryFeatures({ where: where, outFields: [_fieldMap.chapter],
        returnDistinctValues: true, returnGeometry: false })
        .then(function(r) {
          elC.textContent = r.features.length; elC.classList.remove('dim');
        }).catch(function(){});
    }
  }

  // ═══════════════════════════════════════════════════════════
  // FILTERS
  // ═══════════════════════════════════════════════════════════
  function buildWhere() {
    var parts = [];
    FILTER_CHAIN.forEach(function(item) {
      var v = _activeFilter[item.key]; var f = _fieldMap[item.key];
      if (v && f) parts.push(f + "='" + v.replace(/'/g,"''") + "'");
    });
    // Category visibility (With / Without RC toggles)
    if (_fieldMap.masterLabel && _categories.length && (!_showWith || !_showWithout)) {
      var allowed = [];
      mergedCategories(_categories).forEach(function(grp) {
        var isWithout = grp.label.toUpperCase().indexOf('WITHOUT') !== -1;
        if ((isWithout && _showWithout) || (!isWithout && _showWith))
          allowed = allowed.concat(grp.values);
      });
      if (allowed.length === 0) {
        parts.push('1=0');
      } else {
        var catClause = allowed.map(function(v) {
          return _fieldMap.masterLabel + "='" + v.replace(/'/g,"''") + "'";
        }).join(' OR ');
        parts.push('(' + catClause + ')');
      }
    }
    // Fire department text search
    if (_deptSearch && _fieldMap.fireDept) {
      parts.push(_fieldMap.fireDept + " LIKE '%" + _deptSearch.replace(/'/g,"''") + "%'");
    }
    return parts.length ? parts.join(' AND ') : '1=1';
  }

  // Build where using only filters UP TO (not including) chainIndex
  function buildWhereUpTo(chainIndex) {
    // RC-only clause up to chainIndex — does NOT include incident toggles or dept search
    var keys = ['division','region','chapter'];
    var fieldNames = { division:'Division', region:'Region', chapter:'Chapter' };
    var parts = [];
    for (var i = 0; i < chainIndex && i < keys.length; i++) {
      var k = keys[i];
      var v = _activeFilter[k];
      var f = _fieldMap[k] || fieldNames[k];
      if (v && f) parts.push(f + "='" + v.replace(/'/g,"''") + "'");
    }
    return parts.length ? parts.join(' AND ') : '1=1';
  }

  function buildRCWhere() {
    // WHERE clause using RC_ fields for NERIS layers — same logic as buildWhere()
    // but only the Division/Region/Chapter parts (no incident category or dept search)
    var parts = [];
    var keys = { division:'Division', region:'Region', chapter:'Chapter' };
    Object.keys(keys).forEach(function(k) {
      var v = _activeFilter[k];
      if (v) parts.push(keys[k] + "='" + v.replace(/'/g,"''") + "'");
    });
    return parts.length ? parts.join(' AND ') : '1=1';
  }

  function updateStationKpi() {
    var el = $('kpi-stations');
    if (!el || !_stationsLayer) return;
    var rcW = buildRCWhere();
    var q = rcW === '1=1' ? BASE_BOUNDS : '(' + rcW + ') AND ' + BASE_BOUNDS;
    _stationsLayer.queryFeatureCount({ where: q }).then(function(count) {
      el.textContent = count.toLocaleString();
      el.className = 'kpi-num' + (count === 0 ? ' dim' : '');
    }).catch(function(){ el.textContent = '—'; el.className = 'kpi-num dim'; });
  }


  var BASE_BOUNDS = 'x > -125 AND x < -50 AND y > 15 AND y < 75';

  function applyFilters() {
    var w = buildWhere();
    var rcW = buildRCWhere();
    var rcWithBounds = rcW === '1=1' ? BASE_BOUNDS : '(' + rcW + ') AND ' + BASE_BOUNDS;
    if (_flareLayer) _flareLayer.definitionExpression = w;
    if (_stationsLayer) _stationsLayer.definitionExpression = rcWithBounds;
    if (_deptsLayer)    _deptsLayer.definitionExpression    = rcWithBounds;
    FILTER_CHAIN.forEach(function(item) {
      if (_activeFilter[item.key]) item.sel.classList.add('has-value');
      else item.sel.classList.remove('has-value');
    });
    updateKpis();
    updateStationKpi();
  }

  function zoomToFiltered(chainIndex) {
    if (!_view) return;
    var expand = chainIndex <= 1 ? 1.08 : chainIndex <= 2 ? 1.05 : 1.04;

    // Use RC boundary polygon layer — always has geometry regardless of incident data
    var boundaryId = _activeFilter.chapter ? 'chap' : _activeFilter.region ? 'reg' : 'div';
    var bl = _boundaryLayers[boundaryId];
    if (!bl) return;

    var parts = [];
    if (_activeFilter.division) parts.push("Division='" + _activeFilter.division.replace(/'/g,"''") + "'");
    if (_activeFilter.region)   parts.push("Region='"   + _activeFilter.region.replace(/'/g,"''")   + "'");
    if (_activeFilter.chapter)  parts.push("Chapter='"  + _activeFilter.chapter.replace(/'/g,"''")  + "'");
    if (!parts.length) return;

    bl.queryExtent({ where: parts.join(' AND ') }).then(function(r) {
      if (!r || !r.extent) return;
      _view.goTo(r.extent.expand(expand), { duration: 750, easing: 'ease-in-out' })
           .catch(function(){});
    }).catch(function(){});
  }

  function queryUnique(fieldName, whereClause) {
    var w = whereClause || '1=1';
    return _flareLayer.queryFeatures({
      where: w, outFields: [fieldName],
      returnDistinctValues: true, returnGeometry: false,
      orderByFields: [fieldName + ' ASC']
    }).then(function(r) {
      return r.features.map(function(f){ return f.attributes[fieldName]; })
               .filter(function(v){ return v!=null && String(v).trim()!==''; });
    });
  }

  function fillSelect(sel, vals, label, key) {
    sel.innerHTML = '';
    var o = document.createElement('option'); o.value=''; o.textContent=label+' (All)';
    sel.appendChild(o);
    vals.forEach(function(v) {
      var op=document.createElement('option'); op.value=v; op.textContent=v;
      if (_activeFilter[key]===v) op.selected=true;
      sel.appendChild(op);
    });
    sel.disabled = vals.length===0;
  }

  // Reload options for chain[startIndex..end] using filters above startIndex
  function reloadChainFrom(startIndex) {
    for (var i = startIndex; i < FILTER_CHAIN.length; i++) {
      (function(item, idx) {
        var f = _fieldMap[item.key];
        if (!f) {
          item.sel.innerHTML = '<option value="">— not in data —</option>';
          return;
        }
        if (item.key === 'zip') zipRow.style.display = 'block';
        var contextWhere = buildWhereUpTo(idx);
        item.sel.disabled = true;
        item.sel.innerHTML = '<option>Loading...</option>';
        queryUnique(f, contextWhere)
          .then(function(vals) { fillSelect(item.sel, vals, item.label, item.key); })
          .catch(function() { item.sel.innerHTML = '<option value="">— error —</option>'; });
      })(FILTER_CHAIN[i], i);
    }
  }

  // Called when a chain item changes — reset downstream, reload, zoom
  function onChainChange(changedIndex) {
    var item = FILTER_CHAIN[changedIndex];
    _activeFilter[item.key] = item.sel.value;

    // Reset everything below
    for (var i = changedIndex + 1; i < FILTER_CHAIN.length; i++) {
      _activeFilter[FILTER_CHAIN[i].key] = '';
      FILTER_CHAIN[i].sel.value = '';
      FILTER_CHAIN[i].sel.classList.remove('has-value');
    }

    applyFilters();
    reloadChainFrom(changedIndex + 1);

    // Auto-show fire stations when any RC filter is selected
    if (_stationsLayer) {
      _stationsLayer.visible = true;
      var cbSt = $('cb-stations');
      if (cbSt) cbSt.checked = true;
    }
    updateStationKpi();

    // Auto-enable the matching boundary layer when a filter is selected
    // Auto-enable boundary layer — divisions and regions only, not chapters (too granular at national scale)
    var bid = FILTER_TO_BOUNDARY[item.key];
    if (bid && bid !== 'chap' && item.sel.value && _boundaryLayers[bid]) {
      _boundaryLayers[bid].visible = true;
      var cb = $('cb-' + bid);
      if (cb) cb.checked = true;
    }

    // Zoom to selection, or zoom out to parent level when clearing
    if (item.sel.value) {
      zoomToFiltered(changedIndex);
    } else if (changedIndex > 0) {
      zoomToFiltered(changedIndex - 1);
    } else {
      _view.goTo({ extent:{xmin:-130,ymin:21,xmax:-61,ymax:54,spatialReference:{wkid:4326}} },
        { duration:750, easing:'ease-in-out' });
    }
  }

function loadAllFilters() {
    _activeFilter = { division:'', region:'', chapter:'', county:'' };
    reloadChainFrom(0);
  }

  btnClear.addEventListener('click', function() {
    _activeFilter = { division:'', region:'', chapter:'', county:'' };
    FILTER_CHAIN.forEach(function(item) { item.sel.value=''; item.sel.classList.remove('has-value'); });
    _deptSearch = ''; var deptInp = $('station-search'); if (deptInp) { deptInp.value = ''; deptInp.dispatchEvent(new Event('input')); }
    applyFilters();
    reloadChainFrom(0);
    // Zoom back to 48 states
    _view.goTo({
      extent: { xmin:-130, ymin:21, xmax:-61, ymax:54, spatialReference:{wkid:4326} }
    }, { duration: 700 });
  });

  // ═══════════════════════════════════════════════════════════
  // LAYER TOGGLES (incident layers)
  // ═══════════════════════════════════════════════════════════
  function buildIncidentToggles() {
    var cbWith    = $('cb-with');

    if (cbWith) cbWith.addEventListener('change', function() {
      _showWith = cbWith.checked; applyFilters(); updateKpis();

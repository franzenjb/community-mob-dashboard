  // ═══════════════════════════════════════════════════════════
  // STATION POPUP — three designs A / B / C
  // ═══════════════════════════════════════════════════════════

  function initPopStyleButtons() {}  // no-op — single design

  /* ── Station popup ── */
  function stPopupB(a, d) {
    var addr = [a.address, [a.city, stFull(a.state)].filter(Boolean).join(', '), a.zip_code].filter(Boolean).join('  ');
    var h = '<div style="font-family:\'Avenir Next\',\'Segoe UI\',sans-serif">';
    // red header — centered
    h += '<div style="background:#C41E3A;padding:16px 16px 14px;text-align:center">';
    h += '<div style="font-size:16px;font-weight:800;color:#fff;line-height:1.3">' + (a.station_name || 'Fire Station') + '</div>';
    if (a.unit_count) h += '<div style="margin-top:6px;font-size:13px;font-weight:700;color:#fff">' + a.unit_count + ' unit' + (a.unit_count==1?'':'s') + '</div>';
    h += '</div>';
    // address + type
    h += '<div style="padding:10px 16px;border-bottom:1px solid #eee;font-size:12px;color:#333;text-align:center">';
    if (addr) h += '<div>' + addr + '</div>';
    if (a.station_type) h += '<div style="margin-top:3px;font-size:11px;color:#888">' + a.station_type + '</div>';
    h += '</div>';
    // RC section
    h += deptDetail(d);
    // IDs
    h += '<div style="padding:8px 16px 12px;border-top:1px solid #eee">';
    if (a.neris_id) h += '<div style="font-size:11px;color:#777">Station NERIS ID: <span style="font-family:monospace">' + a.neris_id + '</span></div>';
    if (a.department_neris_id) h += '<div style="font-size:11px;color:#777;margin-top:2px">Department NERIS ID: <span style="font-family:monospace">' + a.department_neris_id + '</span></div>';
    h += '</div></div>';
    return h;
  }

  function deptDetail(d) {
    var chapter  = (d && d.Chapter)  || '';
    var region   = (d && d.Region)   || '';
    var division = (d && d.Division) || '';
    if (!chapter && !region && !division) {
      return '<div style="padding:10px 16px;font-size:11px;color:#aaa;font-style:italic;text-align:center">Red Cross chapter info loading…</div>';
    }
    var h = '<div style="padding:12px 16px;background:#f5f5f5;border-top:1px solid #e0e0e0;border-bottom:1px solid #e0e0e0;text-align:center">';
    h += '<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:#555;margin-bottom:8px">Red Cross</div>';
    if (chapter)  h += '<div style="font-size:13px;font-weight:700;color:#111;line-height:1.4">' + chapter + '</div>';
    if (region)   h += '<div style="font-size:12px;color:#333;margin-top:2px">' + region + '</div>';
    if (division) h += '<div style="font-size:11px;color:#555;margin-top:2px">' + division + '</div>';
    h += '</div>';
    return h;
  }

  function renderStationPopup(a, d) {
    $('sr-body').innerHTML = stPopupB(a, d);
  }

  function fetchDeptForStation(deptNerisId) {
    if (!deptNerisId || !_stationsLayer) return;
    var url = (typeof DEPARTMENTS_URL !== 'undefined' ? DEPARTMENTS_URL : '') +
      '/query?where=neris_id%3D%27' + encodeURIComponent(deptNerisId) +
      '%27&outFields=*&f=json';
    fetch(url)
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.features && data.features.length > 0) {
          _lastDeptAttrs = data.features[0].attributes;
          renderStationPopup(_lastStAttrs, _lastDeptAttrs);
        }
      })
      .catch(function() {});
  }

  // ═══════════════════════════════════════════════════════════
  // REFERENCE LAYERS (SVI / NRI)
  // ═══════════════════════════════════════════════════════════
  function initReferenceLayers(map) {
    // SVI
    _sviLayer = new FeatureLayer({
      url: SVI_URL,
      visible: false, opacity: 0.55,
      minScale: 3000000,   // only loads/renders at state zoom or closer
      renderer: buildSviRenderer(),
      outFields: ['RPL_THEMES','RPL_THEME1','RPL_THEME2','RPL_THEME3','RPL_THEME4',
                  'E_TOTPOP','COUNTY','STATE','FIPS'],
      popupEnabled: true,
      popupTemplate: {
        title: 'Social Vulnerability Index',
        outFields: ['*'],
        content: function(feature) {
          var a = feature.graphic.attributes;
          var rpl = parseFloat(a.RPL_THEMES);
          var pct = isNaN(rpl) ? null : Math.round(rpl * 100);
          var color = rpl >= 0.75 ? '#dc2626' : rpl >= 0.5 ? '#f97316' : rpl >= 0.25 ? '#f59e0b' : '#22c55e';
          var label = rpl >= 0.75 ? 'Very High Vulnerability' : rpl >= 0.5 ? 'High Vulnerability' : rpl >= 0.25 ? 'Moderate Vulnerability' : 'Low Vulnerability';
          function scoreBar(val, max, color) {
            var pct = Math.min(100, Math.round((val / max) * 100));
            return '<div style="background:#f0f0f0;border-radius:3px;height:6px;margin-top:3px">' +
                   '<div style="background:' + color + ';width:' + pct + '%;height:100%;border-radius:3px"></div></div>';
          }
          function themeRow(lbl, val, c) {
            var p = isNaN(parseFloat(val)) ? null : Math.round(parseFloat(val)*100);
            if (p === null) return '';
            return '<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;font-size:11px">' +
                   '<span style="color:#666">' + lbl + '</span><span style="font-weight:700;color:' + c + '">' + p + 'th</span></div>' +
                   scoreBar(p, 100, c) + '</div>';
          }
          var html = '<div class="pop-card">';
          html += '<div class="pop-header" style="background:' + color + '">';
          html += '<div class="pop-icon">📊</div><div>';
          html += '<div class="pop-title">' + (a.COUNTY ? a.COUNTY + ', ' + a.STATE : 'Census Tract') + '</div>';
          html += '<div class="pop-subtitle">' + label + '</div>';
          html += '</div></div>';
          html += '<div class="pop-body">';
          if (pct !== null) {
            html += '<div style="text-align:center;padding:12px 0 8px">';
            html += '<div style="font-size:42px;font-weight:800;color:' + color + ';line-height:1">' + pct + '</div>';
            html += '<div style="font-size:11px;color:#999;text-transform:uppercase;letter-spacing:0.8px;margin-top:3px">Overall Percentile</div>';
            html += scoreBar(pct, 100, color);
            html += '</div>';
            html += '<div class="pop-section-title">Theme Scores</div>';
            html += themeRow('Socioeconomic Status',        a.RPL_THEME1, '#6366f1');
            html += themeRow('Household & Disability',      a.RPL_THEME2, '#f97316');
            html += themeRow('Racial & Ethnic Minority',    a.RPL_THEME3, '#10b981');
            html += themeRow('Housing Type & Transport',    a.RPL_THEME4, '#06b6d4');
          }
          if (a.E_TOTPOP) {
            html += '<div style="margin-top:10px;padding-top:10px;border-top:1px solid #f0f0f0;font-size:11px;color:#999">';
            html += 'Population: <strong style="color:#333">' + parseInt(a.E_TOTPOP).toLocaleString() + '</strong>';
            html += '&nbsp;&nbsp;FIPS: <span style="color:#ccc">' + (a.FIPS||'—') + '</span></div>';
          }
          html += '</div></div>';
          return html;
        }
      }
    });

    // NRI
    _nriLayer = new FeatureLayer({
      url: NRI_URL,
      visible: false, opacity: 0.55,
      minScale: 5000000,   // counties are larger — loads at slightly wider view
      renderer: buildNriRenderer(),
      outFields: ['RISK_SCORE','RISK_RATNG','EAL_SCORE','SOVI_SCORE','CRF_VALUE','COUNTY','STATE'],
      popupEnabled: true,
      popupTemplate: {
        title: 'National Risk Index',
        outFields: ['*'],
        content: function(feature) {
          var a = feature.graphic.attributes;
          var score = parseFloat(a.RISK_SCORE);
          var rating = (a.RISK_RATNG || '').trim();
          var color = score >= 80 ? '#312e81' : score >= 60 ? '#4338ca' : score >= 40 ? '#6366f1' : score >= 20 ? '#93c5fd' : '#bfdbfe';
          var textColor = score >= 40 ? '#fff' : '#1e3a5f';
          function bar(val, max, c) {
            var p = Math.min(100, Math.round((val / max) * 100));
            return '<div style="background:#f0f0f0;border-radius:3px;height:6px;margin-top:3px">' +
                   '<div style="background:' + c + ';width:' + p + '%;height:100%;border-radius:3px"></div></div>';
          }
          function metricRow(lbl, val, max, c) {
            if (val === null || val === undefined || isNaN(parseFloat(val))) return '';
            var n = parseFloat(val);
            return '<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;font-size:11px">' +
                   '<span style="color:#666">' + lbl + '</span>' +
                   '<span style="font-weight:700;color:' + c + '">' + n.toFixed(1) + '</span></div>' +
                   bar(n, max, c) + '</div>';
          }
          var html = '<div class="pop-card">';
          html += '<div class="pop-header" style="background:' + color + '">';
          html += '<div class="pop-icon">⚠️</div><div>';
          html += '<div class="pop-title">' + (a.COUNTY ? a.COUNTY + ', ' + a.STATE : 'Census Tract') + '</div>';
          html += '<div class="pop-subtitle">' + (rating || 'Risk Index Score') + '</div>';
          html += '</div></div>';
          html += '<div class="pop-body">';
          if (!isNaN(score)) {
            html += '<div style="text-align:center;padding:12px 0 8px">';
            html += '<div style="font-size:42px;font-weight:800;color:' + (score >= 40 ? color : '#312e81') + ';line-height:1">' + score.toFixed(1) + '</div>';
            html += '<div style="font-size:11px;color:#999;text-transform:uppercase;letter-spacing:0.8px;margin-top:3px">Composite Risk Score (0–100)</div>';
            html += bar(score, 100, color);
            html += '</div>';
          }
          html += '<div class="pop-section-title">Components</div>';
          html += metricRow('Expected Annual Loss',     a.EAL_SCORE,  100, '#dc2626');
          html += metricRow('Social Vulnerability',     a.SOVI_SCORE, 100, '#f97316');
          html += metricRow('Community Resilience',     a.CRF_VALUE,  100, '#22c55e');
          html += '</div></div>';
          return html;
        }
      }
    });

    // Boundary layers go beneath incident data
    BOUNDARY_CONFIGS.forEach(function(cfg) {
      var lbl = {
        type: 'text',
        color: cfg.color,
        haloColor: [255,255,255,220],
        haloSize: 2,
        font: { size: 10, weight: 'bold', family: 'Avenir Next' }
      };
      var bl = new FeatureLayer({
        url: ARC_GEO_BASE + '/' + cfg.layerId,
        visible: true,
        opacity: 0.9,
        renderer: new UniqueValueRenderer({
          field: cfg.field,
          defaultSymbol: new SimpleFillSymbol({
            color: [0,0,0,0],
            outline: { color: cfg.color, width: cfg.width, style: 'solid' }
          })
        }),
        labelingInfo: [{
          labelExpressionInfo: { expression: '$feature.' + cfg.field },
          symbol: lbl,
          minScale: cfg.labelMinScale,
          maxScale: cfg.labelMaxScale,
          labelPlacement: 'always-horizontal',
          where: '1=1'
        }],
        labelsVisible: true,
        popupEnabled: false
      });
      map.add(bl, 0); // insert below everything else
      _boundaryLayers[cfg.id] = bl;
      (function(layer, checkboxId) {
        var cb = $(checkboxId);
        if (cb) cb.addEventListener('change', function() { layer.visible = cb.checked; });
      })(bl, 'cb-' + cfg.id);
    });

    // Fire Stations — AGOL Feature Layer (replaces CSVLayer)
    _stationsLayer = new FeatureLayer({
      url: STATIONS_URL,
      visible: false,
      minScale: 0,
      title: 'Fire Stations',
      outFields: ['*'],
      definitionExpression: 'x > -125 AND x < -50 AND y > 15 AND y < 75',
      renderer: {
        type: 'simple',
        symbol: new PictureMarkerSymbol({
          url: 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(
            '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">' +
            '<rect x="2" y="2" width="20" height="20" rx="2" fill="#111827" stroke="#fbbf24" stroke-width="1.5"/>' +
            '<rect x="6" y="10" width="3" height="10" fill="#fbbf24"/>' +
            '<rect x="10.5" y="10" width="3" height="10" fill="#fbbf24"/>' +
            '<rect x="15" y="10" width="3" height="10" fill="#fbbf24"/>' +
            '<rect x="5" y="8" width="14" height="2.5" fill="#fbbf24"/>' +
            '<polygon points="12,1 22,8 2,8" fill="#fbbf24"/>' +
            '</svg>'
          ),
          width: 18, height: 18
        })
      },
      popupEnabled: false
    });

    // Departments layer — HQ points
    _deptsLayer = new FeatureLayer({
      url: DEPARTMENTS_URL,
      visible: false,
      title: 'Fire Departments',
      outFields: ['*'],
      definitionExpression: 'x > -125 AND x < -50 AND y > 15 AND y < 75',
      renderer: {
        type: 'simple',
        symbol: new PictureMarkerSymbol({
          url: 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(
            '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">' +
            '<circle cx="12" cy="12" r="11" fill="#1e3a5f" stroke="#ffffff" stroke-width="1.5"/>' +
            '<rect x="10" y="5" width="4" height="14" fill="#ffffff"/>' +
            '<rect x="5" y="10" width="14" height="4" fill="#ffffff"/>' +
            '</svg>'
          ),
          width: 18, height: 18
        })
      },
      popupEnabled: false
    });

    map.addMany([_sviLayer, _nriLayer, _stationsLayer, _deptsLayer]);

    $('cb-depts').addEventListener('change', function() { _deptsLayer.visible = $('cb-depts').checked; });
    $('cb-svi').addEventListener('change', function() { _sviLayer.visible = $('cb-svi').checked; });
    $('cb-nri').addEventListener('change', function() { _nriLayer.visible = $('cb-nri').checked; });

    // Dept list — queried from Departments FeatureLayer on first keystroke
    var _stationDataReady = false;   // true once dept list is loaded

    $('cb-stations').addEventListener('change', function() {
      _stationsLayer.visible = $('cb-stations').checked;
    });

    // Department typeahead — multi-select with chips
    var _stationTimer;
    var _deptMinStations = 0;
    var _deptMinFF       = 0;
    var inp        = $('station-search');
    var dd         = $('station-dropdown');
    var chipsEl    = $('dept-chips');
    var _selectedDepts = [];   // array of department_name strings

    // Wire clear button
    var clearBtn = $('station-search-clear');
    if (clearBtn) {
      clearBtn.addEventListener('click', function() {
        inp.value = '';
        clearBtn.style.display = 'none';
        dd.style.display = 'none';
        _selectedDepts = [];
        renderChips();
        applyDeptFilter();
      });
    }
    // Show/hide clear button as user types
    inp.addEventListener('input', function() {
      if (clearBtn) clearBtn.style.display = inp.value.trim() ? '' : 'none';
    }, true);

    // Department search — live query per keystroke against Departments FeatureLayer
    var _deptList = [];   // cached results for last query
    var _deptQueryLayer = new FeatureLayer({ url: DEPARTMENTS_URL });
    function buildDeptList(callback, searchTerm) {
      // Live search: query for matching depts on every keystroke
      var where = searchTerm
        ? "UPPER(name) LIKE UPPER('%" + searchTerm.replace(/'/g,"''") + "%')"
        : "1=1";
      _deptQueryLayer.queryFeatures({
        where: where,
        outFields: ['name','state','station_count','firefighters_career_ft','firefighters_career_pt','firefighters_volunteer'],
        returnGeometry: false,
        num: 50,
        orderByFields: ['name ASC']
      }).then(function(result) {
        _deptList = result.features.map(function(f) {
          var a = f.attributes;
          return {
            department_name: a.name || '',
            state: a.state || '',
            count: a.station_count || 0,
            ff: (a.firefighters_career_ft||0) + (a.firefighters_career_pt||0) + (a.firefighters_volunteer||0)
          };
        }).filter(function(d){ return d.department_name; });
        _stationDataReady = true;
        if (callback) callback();
      }).catch(function(e){ console.warn('Dept query failed:', e); });
    }

    function zoomToSelectedDepts() {
      if (!_selectedDepts.length || !_view) return;
      // Use queryExtent on the stations FeatureLayer — works natively, no CSV needed
      var clauses = _selectedDepts.map(function(n){
        return "department_name = '" + n.replace(/'/g,"''") + "'";
      });
      _stationsLayer.queryExtent({ where: clauses.join(' OR ') }).then(function(result) {
        if (result && result.extent) {
          _view.goTo(result.extent.expand(1.15), { animate: false });
        }
      }).catch(function(e){ console.warn('queryExtent failed:', e); });
    }

    function updateDeptKpiBar() {
      var tiles = document.querySelectorAll('.kpi-dept-tile');
      if (!_selectedDepts.length) {
        tiles.forEach(function(t){ t.style.display = 'none'; });
        return;
      }
      tiles.forEach(function(t){ t.style.display = ''; });
      // Query dept layer for selected depts
      var clauses = _selectedDepts.map(function(n){
        return "name = '" + n.replace(/'/g,"''") + "'";
      });
      var deptLayer = new FeatureLayer({ url: DEPARTMENTS_URL });
      deptLayer.queryFeatures({
        where: clauses.join(' OR '),
        outFields: ['station_count','unit_count','population_protected',
                    'firefighters_career_ft','firefighters_career_pt','firefighters_volunteer'],
        returnGeometry: false, num: 2000
      }).then(function(r) {
        var totStations=0, totUnits=0, totFF=0;
        r.features.forEach(function(f) {
          var a = f.attributes;
          totStations += (a.station_count || 0);
          totUnits    += (a.unit_count    || 0);
          totFF       += (a.firefighters_career_ft||0) + (a.firefighters_career_pt||0) + (a.firefighters_volunteer||0);
        });
        function setKpi(id, val) {
          var el = $(id); if (!el) return;
          el.textContent = val > 0 ? val.toLocaleString() : '—';
          el.className = 'kpi-num' + (val === 0 ? ' dim' : '');
        }
        setKpi('dkpi-depts',    _selectedDepts.length);
        setKpi('dkpi-stations', totStations);
        setKpi('dkpi-units',    totUnits);
        setKpi('dkpi-ff',       totFF);
      });
    }

    function applyDeptFilter() {
      var rcW = buildRCWhere();
      if (!_selectedDepts.length) {
        _stationsLayer.definitionExpression = rcW === '1=1' ? BASE_BOUNDS : '(' + rcW + ') AND ' + BASE_BOUNDS;
        updateStationKpi();
        return;
      }
      var deptClauses = _selectedDepts.map(function(n){
        return "department_name = '" + n.replace(/'/g,"''") + "'";
      });
      var combined = rcW === '1=1'
        ? deptClauses.join(' OR ')
        : '(' + deptClauses.join(' OR ') + ') AND ' + rcW;
      _stationsLayer.definitionExpression = '(' + combined + ') AND ' + BASE_BOUNDS;
      _stationsLayer.visible = true;
      var cb = $('cb-stations');
      if (cb) cb.checked = true;
      updateStationKpi();
      updateDeptKpiBar();
      // Small delay so layer registers new definitionExpression before queryExtent
      setTimeout(zoomToSelectedDepts, 200);
    }

    function renderChips() {
      chipsEl.innerHTML = '';
      if (!_selectedDepts.length) { chipsEl.style.display = 'none'; return; }
      chipsEl.style.display = 'flex';
      _selectedDepts.forEach(function(name) {
        var chip = document.createElement('div');
        chip.style.cssText = 'display:inline-flex;align-items:center;gap:4px;padding:3px 8px;' +
          'background:#fdf5f6;border:1px solid #C41E3A;border-radius:12px;font-size:11px;' +
          'color:#C41E3A;font-weight:600;white-space:nowrap;max-width:200px;overflow:hidden;text-overflow:ellipsis';
        chip.title = name;
        chip.innerHTML = '<span style="overflow:hidden;text-overflow:ellipsis">' + name + '</span>' +
          '<span style="cursor:pointer;font-size:13px;line-height:1;margin-left:2px;flex-shrink:0">×</span>';
        chip.querySelector('span:last-child').addEventListener('click', function() {
          _selectedDepts = _selectedDepts.filter(function(n){ return n !== name; });
          renderChips();
          applyDeptFilter();
        });
        chipsEl.appendChild(chip);
      });
      // Clear all button when >1 dept selected
      if (_selectedDepts.length > 1) {
        var clr = document.createElement('div');
        clr.style.cssText = 'padding:3px 8px;border:1px solid #aaa;border-radius:12px;font-size:11px;' +
          'color:#666;cursor:pointer;white-space:nowrap';
        clr.textContent = 'Clear all';
        clr.addEventListener('click', function() {
          _selectedDepts = [];
          renderChips();
          applyDeptFilter();
          updateDeptKpiBar();
        });
        chipsEl.appendChild(clr);
      }
    }

    var _lastMatches = [];   // keep current match list for re-render after toggle

    function showDeptDropdown(matches, keepOpen) {
      if (matches) _lastMatches = matches;
      dd.innerHTML = '';

      // ── Done button at top ──────────────────────────────────
      var doneRow = document.createElement('div');
      doneRow.style.cssText = 'padding:6px 10px;border-bottom:2px solid #e4e4e4;display:flex;' +
        'align-items:center;justify-content:space-between;background:#fafafa;position:sticky;top:0;z-index:1';
      var doneLabel = _selectedDepts.length
        ? '<span style="font-size:11px;color:#C41E3A;font-weight:600">' + _selectedDepts.length + ' selected</span>'
        : '<span style="font-size:11px;color:#aaa">Select departments</span>';
      doneRow.innerHTML = doneLabel +
        '<button style="padding:3px 10px;background:#C41E3A;color:#fff;border:none;border-radius:4px;' +
        'font-size:11px;font-weight:600;cursor:pointer;line-height:1.4">Done</button>';
      doneRow.querySelector('button').addEventListener('mousedown', function(e) {
        e.preventDefault();
        dd.style.display = 'none';
        inp.value = '';
        inp.blur();
      });
      dd.appendChild(doneRow);

      if (!_lastMatches.length) {
        var none = document.createElement('div');
        none.style.cssText = 'padding:8px 10px;font-size:12px;color:#aaa';
        none.textContent = 'No results';
        dd.appendChild(none);
        dd.style.display = '';
        return;
      }

      _lastMatches.slice(0, 50).forEach(function(d) {
        var already = _selectedDepts.indexOf(d.department_name) !== -1;
        var item = document.createElement('div');
        item.style.cssText = 'padding:7px 10px;font-size:12px;cursor:pointer;border-bottom:1px solid #f0f0f0;' +
          'line-height:1.35;display:flex;align-items:flex-start;gap:8px' +
          (already ? ';background:#fdf5f6' : '');
        // Checkbox-style indicator
        var chk = '<span style="flex-shrink:0;margin-top:1px;width:14px;height:14px;border-radius:3px;border:1.5px solid ' +
          (already ? '#C41E3A' : '#ccc') + ';background:' + (already ? '#C41E3A' : '#fff') +
          ';display:inline-flex;align-items:center;justify-content:center;font-size:10px;color:#fff">' +
          (already ? '✓' : '') + '</span>';
        item.innerHTML = chk +
          '<div><div style="font-weight:600;color:' + (already ? '#C41E3A' : '#222') + '">' +
          d.department_name + '</div>' +
          '<div style="font-size:11px;color:#888">' + d.state + ' &nbsp;·&nbsp; ' +
          d.count + ' station' + (d.count !== 1 ? 's' : '') + '</div></div>';
        item.addEventListener('mousedown', function(e) {
          e.preventDefault();
          console.log('[SELECT] dept clicked:', d.department_name);
          if (!already) {
            _selectedDepts.push(d.department_name);
          } else {
            _selectedDepts = _selectedDepts.filter(function(n){ return n !== d.department_name; });
          }
          console.log('[SELECT] _selectedDepts now:', JSON.stringify(_selectedDepts));
          renderChips();
          applyDeptFilter();
          showDeptDropdown(null, true);
        });
        item.addEventListener('mouseover', function(){ item.style.background='#fdf5f6'; });
        item.addEventListener('mouseout',  function(){ item.style.background = already ? '#fdf5f6' : ''; });
        dd.appendChild(item);
      });
      dd.style.display = '';
    }

    function getFilteredDeptList() {
      return _deptList.filter(function(d) {
        return d.count >= _deptMinStations && d.ff >= _deptMinFF;
      });
    }

    $('dept-min-stations').addEventListener('change', function() {
      _deptMinStations = parseInt(this.value) || 0;
      var q = inp.value.trim().toLowerCase();
      if (q && _deptList.length) {
        var filtered = getFilteredDeptList().filter(function(d){
          return d.department_name.toLowerCase().indexOf(q) !== -1;
        });
        showDeptDropdown(filtered);
      }
    });

    $('dept-min-ff').addEventListener('change', function() {
      _deptMinFF = parseInt(this.value) || 0;
      var q = inp.value.trim().toLowerCase();
      if (q && _deptList.length) {
        var filtered = getFilteredDeptList().filter(function(d){
          return d.department_name.toLowerCase().indexOf(q) !== -1;
        });
        showDeptDropdown(filtered);
      }
    });

    inp.addEventListener('input', function() {
      clearTimeout(_stationTimer);
      var q = inp.value.trim().toLowerCase();
      if (!q) { dd.style.display='none'; _lastMatches=[]; return; }
      _stationTimer = setTimeout(function() {
        buildDeptList(function() {
          var filtered = getFilteredDeptList().filter(function(d){
            return d.department_name.toLowerCase().indexOf(q) !== -1;
          });
          showDeptDropdown(filtered);
        }, q);
      }, 300);
    });

    // Only close on blur if clicking outside the dropdown entirely
    inp.addEventListener('blur', function() {
      setTimeout(function() {
        if (!dd.matches(':hover') && document.activeElement !== inp) {
          dd.style.display = 'none';
        }
      }, 200);
    });
    inp.addEventListener('focus', function(){ if (_lastMatches.length) showDeptDropdown(null, true); });
  }

  // ═══════════════════════════════════════════════════════════
  // MAIN INIT
  // ═══════════════════════════════════════════════════════════
  function initApp() {
    setMsg('Loading layer...');

    var map  = new Map({ basemap: 'gray-vector' });
    _view = new MapView({
      container: 'viewDiv', map: map,
      extent: {
        xmin: -122.0, ymin: 25.5, xmax: -69.0, ymax: 48.5,
        spatialReference: { wkid: 4326 }
      }
    });

    _view.ui.add(new Home({ view:_view }), 'top-left');
    _view.ui.add(new ScaleBar({ view:_view, unit:'dual' }), 'bottom-right');
    _view.popup.autoOpenEnabled = false;

    // ── Click → right sidebar feature info ──────────────────────
    _view.on('click', function(evt) {
      _view.hitTest(evt).then(function(response) {
        // Check for FLARE incident first
        var hit = response.results.find(function(r) {
          return r.graphic && r.graphic.layer === _flareLayer;
        });
        if (hit) {
          var html = buildPopupContent({ graphic: hit.graphic });
          $('sr-body').innerHTML = html;
          $('sidebar-right').classList.add('open');
          return;
        }
        // Check for department HQ
        var deptHit = response.results.find(function(r) {
          return r.graphic && r.graphic.layer === _deptsLayer;
        });
        if (deptHit) {
          var a = deptHit.graphic.attributes;
          var services = (a.fire_services || '').split(',').map(function(s){ return s.trim(); }).filter(Boolean);
          var ems = (a.ems_services || '').split(',').map(function(s){ return s.trim(); }).filter(Boolean);
          var inv = (a.investigation_services || '').split(',').map(function(s){ return s.trim(); }).filter(Boolean);
          var totalFF = (a.firefighters_career_ft||0) + (a.firefighters_career_pt||0) + (a.firefighters_volunteer||0);
          var hasStaff = totalFF > 0 || a.population_protected > 0;

          var h = '<div style="padding:0 0 12px">';
          // Header
          h += '<div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:12px">';
          h += '<div style="width:32px;height:32px;background:#C41E3A;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff;font-weight:800">🔥</div>';
          h += '<div><div style="font-size:14px;font-weight:800;color:#111;line-height:1.2">' + (a.name || 'Fire Department') + '</div>';
          h += '<div style="font-size:11px;color:#888;margin-top:2px">' + (a.city||'') + (a.state ? ', '+a.state : '') + (a.department_type ? ' &nbsp;·&nbsp; '+a.department_type : '') + '</div></div></div>';

          // Headline stats
          h += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px">';
          function dkpi(label, val, color) {
            if (!val && val !== 0) return '';
            return '<div style="background:#f8f8f8;border-radius:6px;padding:8px 10px;text-align:center">' +
              '<div style="font-size:18px;font-weight:800;color:'+(color||'#111')+'">' + val.toLocaleString() + '</div>' +
              '<div style="font-size:9.5px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#888;margin-top:2px">' + label + '</div></div>';
          }
          if (a.station_count) h += dkpi('Stations', a.station_count, '#C41E3A');
          if (a.unit_count) h += dkpi('Apparatus', a.unit_count, '#f97316');
          if (a.population_protected) h += dkpi('Population', a.population_protected, '#2D6DB4');
          if (totalFF) h += dkpi('Firefighters', totalFF, '#16a34a');
          h += '</div>';

          // Staffing breakdown
          if (hasStaff && totalFF > 0) {
            h += '<div style="margin-bottom:10px;padding:8px 10px;background:#f8f8f8;border-radius:6px">';
            h += '<div style="font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#aaa;margin-bottom:6px">Staffing</div>';
            function staffRow(label, ft, pt, vol) {
              if (!ft && !pt && !vol) return '';
              var r = '<div style="display:flex;justify-content:space-between;font-size:11px;padding:2px 0">';
              r += '<span style="color:#555">' + label + '</span>';
              r += '<span style="font-weight:600">';
              var parts = [];
              if (ft) parts.push(ft + ' career FT');
              if (pt) parts.push(pt + ' PT');
              if (vol) parts.push(vol + ' volunteer');
              r += parts.join(' · ') + '</span></div>';
              return r;
            }
            h += staffRow('Firefighters', a.firefighters_career_ft, a.firefighters_career_pt, a.firefighters_volunteer);
            h += staffRow('EMS Only', a.ems_only_career_ft, a.ems_only_career_pt, a.ems_only_volunteer);
            h += '</div>';
          }

          // Services — collapsed toggle
          h += '<details style="margin-bottom:10px">' +
               '<summary style="cursor:pointer;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#888;list-style:none;display:flex;align-items:center;gap:5px;padding:5px 0;border-top:1px solid #f0f0f0">' +
               '<span style="font-size:11px">▸</span> Services &amp; Capabilities</summary>' +
               '<div style="padding-top:8px">' +
               '<div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#aaa;margin-bottom:3px">Fire Services</div>' +
               serviceGrid(a.fire_services, ALL_FIRE_SERVICES, '#C41E3A', '#fdf5f6', '#f5c6c6') +
               '<div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#aaa;margin:6px 0 3px">EMS Services</div>' +
               serviceGrid(a.ems_services, ALL_EMS_SERVICES, '#2D6DB4', '#eff6ff', '#bfdbfe') +
               '<div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#aaa;margin:6px 0 3px">Investigation</div>' +
               serviceGrid(a.investigation_services, ALL_INV_SERVICES, '#16a34a', '#f0fdf4', '#bbf7d0') +
               '</div></details>';

          // Accreditation + shifts
          var accrBits = [];
          if (a.assessment_caas_accredited) accrBits.push('CAAS Accredited');
          if (a.assessment_cpse_accredited) accrBits.push('CPSE Accredited');
          if (accrBits.length || a.shift_count) {
            h += '<div style="margin-bottom:10px;font-size:11px;color:#555">';
            if (accrBits.length) h += '<div style="margin-bottom:3px">✓ ' + accrBits.join(' &nbsp;·&nbsp; ✓ ') + '</div>';
            if (a.shift_count) h += '<div>' + a.shift_count + ' shift' + (a.shift_count!==1?'s':'') + (a.shift_duration ? ', ' + a.shift_duration + 'hr' : '') + '</div>';
            h += '</div>';
          }

          // Red Cross hierarchy
          if (a.Chapter || a.Region || a.Division) {
            h += '<div style="background:#fdf5f6;border:1px solid #f5c6c6;border-radius:6px;padding:8px 10px;margin-bottom:10px">';
            h += '<div style="font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#C41E3A;margin-bottom:6px">American Red Cross</div>';
            function rcRow(label, val) {
              if (!val) return '';
              return '<div style="display:flex;justify-content:space-between;font-size:11px;padding:2px 0;border-bottom:1px solid #fce7e7">' +
                '<span style="color:#888;flex-shrink:0;margin-right:10px">' + label + '</span>' +
                '<span style="font-weight:600;color:#111;text-align:right">' + val + '</span></div>';
            }
            h += rcRow('Chapter', a.Chapter);
            h += rcRow('Region',  a.Region);
            h += rcRow('Division', a.Division);
            h += '</div>';
          }

          // Website + address
          h += '<div style="border-top:1px solid #f0f0f0;padding-top:8px;margin-top:4px;font-size:11px;color:#888">';
          if (a.address_line_1) h += '<div>' + a.address_line_1 + (a.city ? ', ' + a.city : '') + (a.state ? ' ' + a.state : '') + (a.zip_code ? ' ' + a.zip_code : '') + '</div>';
          if (a.website) h += '<div style="margin-top:4px"><a href="' + a.website + '" target="_blank" style="color:#C41E3A;text-decoration:none">' + a.website.replace('https://','').replace('http://','').replace(/\/$/,'') + ' →</a></div>';
          if (a.neris_id) h += '<div style="margin-top:4px;font-family:monospace;font-size:10px;color:#bbb">' + a.neris_id + '</div>';
          h += '</div></div>';

          $('sr-body').innerHTML = h;
          $('sidebar-right').classList.add('open');
          return;
        }

        // Check for fire station
        var stHit = response.results.find(function(r) {
          return r.graphic && r.graphic.layer === _stationsLayer;
        });
        if (stHit) {
          _lastStAttrs  = stHit.graphic.attributes;
          _lastDeptAttrs = null;
          renderStationPopup(_lastStAttrs, null);
          $('sidebar-right').classList.add('open');
          fetchDeptForStation(_lastStAttrs.department_neris_id);
        }
      });
    });

    // ── Red Cross Geography accordion ────────────────────────────
    // ── Dept search button in station popup ──────────────────────
    document.addEventListener('click', function(e) {
      if (e.target && e.target.classList.contains('dept-search-btn')) {
        var dept = e.target.getAttribute('data-dept');
        if (dept) {
          var inp = $('station-search');
          inp.value = dept;
          inp.dispatchEvent(new Event('input', { bubbles: true }));
        }
      }
    });

    // ── Map Layers accordion ─────────────────────────────────────
    $('acc-layers-btn').addEventListener('click', function() {
      var body  = $('acc-layers-body');
      var arrow = $('acc-layers-arrow');
      var open  = body.style.display !== 'none';
      body.style.display  = open ? 'none' : '';
      arrow.textContent   = open ? '▸' : '▾';
    });

    // ── Left sidebar toggle ──────────────────────────────────────
    $('left-tab').addEventListener('click', function() {
      var wrap = $('left-wrap');
      wrap.classList.toggle('collapsed');
      $('left-tab').innerHTML = wrap.classList.contains('collapsed') ? '&#8250;' : '&#8249;';
    });
    // ── Right sidebar close ──────────────────────────────────────
    $('close-right').addEventListener('click', function() {
      $('sidebar-right').classList.remove('open');
    });

    // Show "zoom in" badge on SVI/NRI toggles when layer is on but out of scale range
    reactiveUtils.watch(
      function() { return _view.scale; },
      function(scale) {
        var sviBadge = $('svi-zoom-badge');
        var nriBadge = $('nri-zoom-badge');
        if (sviBadge) sviBadge.style.display = (_sviLayer && _sviLayer.visible && scale > 3000000) ? 'inline' : 'none';
        if (nriBadge) nriBadge.style.display = (_nriLayer && _nriLayer.visible && scale > 5000000) ? 'inline' : 'none';
        var stBadge = $('stations-zoom-badge');
        if (stBadge) stBadge.style.display = 'none';
      }
    );
    $('cb-svi').addEventListener('change', function() {
      var badge = $('svi-zoom-badge');
      if (badge) badge.style.display = ($('cb-svi').checked && _view.scale > 3000000) ? 'inline' : 'none';
    });
    $('cb-nri').addEventListener('change', function() {
      var badge = $('nri-zoom-badge');
      if (badge) badge.style.display = ($('cb-nri').checked && _view.scale > 5000000) ? 'inline' : 'none';
    });
    _view.ui.add(new Expand({
      view:_view, expandTooltip:'Legend',
      expandIconClass:'esri-icon-legend',
      content: new Legend({ view:_view })
    }), 'top-right');

    // Wire A/B/C popup style buttons
    initPopStyleButtons();

    // Init reference layers first (behind incident data)
    initReferenceLayers(map);

    // Load FLARE layer — outFields:['*'] required so hitTest graphics have all attributes
    var fl = new FeatureLayer({
      portalItem: { id: FLARE_ITEM, portal: { url: PORTAL } },
      outFields: ['*']
    });

    fl.load().then(function() {
      _flareLayer = fl;
      setMsg('Analyzing fields...');

      // Resolve field map
      Object.keys(FIELDS).forEach(function(k) {
        _fieldMap[k] = resolveField(fl.fields, k);
      });

      // Console dump — full field list
      console.log('=== FLARE Fields ===');
      fl.fields.forEach(function(f) {
        console.log('  %-30s %-15s alias: %s'.replace('%s',f.alias)
          .replace('%s',f.type).replace('%s',f.name));
      });
      console.log('Field map:', _fieldMap);

      // Disable native popup — feature info shown in right sidebar instead
      fl.popupEnabled = false;

      // Build renderer from master label categories
      var labelField = _fieldMap.masterLabel;
      var afterRenderer = function() {
        map.add(fl);
        buildIncidentToggles();
        loadAllFilters();
        updateKpis();
        // Prime the incident layer: briefly enable both, then restore to off
        // This ensures the layer initializes correctly so toggling works on first use
        _showWith = true; _showWithout = true;
        applyFilters();
        setTimeout(function() {
          _showWith = false; _showWithout = false;
          var cbWith = $('cb-with'); var cbWithout = $('cb-without');
          if (cbWith) cbWith.checked = false;
          if (cbWithout) cbWithout.checked = false;
          applyFilters();
        }, 500);
        _view.when(function() {
          hideLoad();
          // Extent set at view creation — no auto-zoom
        });
      };

      if (labelField) {
        queryUnique(labelField).then(function(cats) {
          _categories = cats;
          fl.renderer = buildRenderer(labelField, cats);
          buildKpiBar(cats);
          setMsg('Loading map...');
          afterRenderer();
        }).catch(function() { afterRenderer(); });
      } else {
        afterRenderer();
      }

    }).catch(function(err) {
      console.error('Layer load failed:', err);
      setMsg('Layer failed to load — see console.');
    });
  }

  // ═══════════════════════════════════════════════════════════
  // AUTH
  // ═══════════════════════════════════════════════════════════
  wireChain();

  initApp();

});
</script>

<script>
// ═══════════════════════════════════════════════════
// MOBILE TRAY — layer-grid wired to FLARE layers
// ═══════════════════════════════════════════════════

var LAYER_COLORS = ['#C41E3A','#00d4ff','#ff6b35','#a855f7','#f59e0b'];
var LAYER_NAMES  = ['INCIDENTS','BOUNDARIES','FIELD ASSETS','RISK DATA','TOOLS'];

var CONUS = { xmin:-130, ymin:21, xmax:-61, ymax:54, spatialReference:{wkid:4326} };

// Each layer: 6 content slots (positions 0,1,2,3,5,7 in the 3x3)
// action: function to call on tap
// label/sub: button text
// toggle: optional cb id to reflect state
var LAYERS = [
  // 0 — INCIDENTS (red)
  [
    { main:'WITH RC',   sub:'show',   action: function(){ toggleCb('cb-with');    }, toggle:'cb-with'    },
    { main:'W/O RC',    sub:'show',   action: function(){ toggleCb('cb-without'); }, toggle:'cb-without' },
    { main:'SHOW ALL',  sub:'both on',action: function(){ setCb('cb-with',true);  setCb('cb-without',true);  } },
    { main:'HIDE ALL',  sub:'clear',  action: function(){ setCb('cb-with',false); setCb('cb-without',false); } },
    { main:'ZOOM US',   sub:'conus',  action: function(){ var v=window._flare('view'); if(v) v.goTo({extent:CONUS},{duration:750}); } },
    { main:'INFO',      sub:'on tap', action: function(){ toast('Tap any incident on the map'); } },
  ],
  // 1 — BOUNDARIES (cyan)
  [
    { main:'DIVISION',  sub:'overlay', action: function(){ toggleCb('cb-div');  }, toggle:'cb-div'  },
    { main:'REGION',    sub:'overlay', action: function(){ toggleCb('cb-reg');  }, toggle:'cb-reg'  },
    { main:'CHAPTER',   sub:'overlay', action: function(){ toggleCb('cb-chap'); }, toggle:'cb-chap' },
    { main:'ALL ON',    sub:'bounds',  action: function(){ setCb('cb-div',true);  setCb('cb-reg',true);  setCb('cb-chap',true);  } },
    { main:'HIDE',      sub:'bounds',  action: function(){ setCb('cb-div',false); setCb('cb-reg',false); setCb('cb-chap',false); } },
    { main:'ZOOM US',   sub:'conus',   action: function(){ var v=window._flare('view'); if(v) v.goTo({extent:CONUS},{duration:750}); } },
  ],
  // 2 — FIELD ASSETS (orange)
  [
    { main:'STATIONS',  sub:'62k pts', action: function(){ toggleCb('cb-stations'); }, toggle:'cb-stations' },
    { main:'DEPTS',     sub:'30k pts', action: function(){ toggleCb('cb-depts');    }, toggle:'cb-depts'    },
    { main:'BOTH ON',   sub:'field',   action: function(){ setCb('cb-stations',true); setCb('cb-depts',true); } },
    { main:'HIDE',      sub:'field',   action: function(){ setCb('cb-stations',false); setCb('cb-depts',false); } },
    { main:'ZOOM US',   sub:'conus',   action: function(){ var v=window._flare('view'); if(v) v.goTo({extent:CONUS},{duration:750}); } },
    { main:'COUNT',     sub:'visible', action: function(){ countVisible(); } },
  ],
  // 3 — RISK DATA (purple)
  [
    { main:'SVI',       sub:'vulner.', action: function(){ toggleCb('cb-svi'); }, toggle:'cb-svi' },
    { main:'NRI',       sub:'risk idx',action: function(){ toggleCb('cb-nri'); }, toggle:'cb-nri' },
    { main:'BOTH ON',   sub:'risk',    action: function(){ setCb('cb-svi',true); setCb('cb-nri',true); } },
    { main:'HIDE',      sub:'risk',    action: function(){ setCb('cb-svi',false); setCb('cb-nri',false); } },
    { main:'ZOOM IN',   sub:'req\'d',  action: function(){ toast('Zoom in to state level to view'); } },
    { main:'ABOUT',     sub:'risk',    action: function(){ toast('SVI=CDC Vulnerability · NRI=FEMA Risk'); } },
  ],
  // 4 — TOOLS (gold)
  [
    { main:'LOCATE',    sub:'me',      action: function(){ locateMe(); } },
    { main:'CLEAR ALL', sub:'reset',   action: function(){ mobileClearAll(); } },
    { main:'THEME',     sub:'light/dark', action: function(){ toggleTheme(); } },
    { main:'FLARE v2',  sub:'desktop', action: function(){ window.open('https://flare-v2-red.vercel.app/','_blank'); } },
    { main:'SHARE',     sub:'url',     action: function(){ copyUrl(); } },
    { main:'HUB',       sub:'back',    action: function(){ window.location.href='https://arc-mobile-ui.vercel.app/orbital-launcher.html'; } },
  ],
];

var currentLayer = 0;

function toggleCb(id) {
  var cb = document.getElementById(id);
  if (!cb) return;
  cb.checked = !cb.checked;
  cb.dispatchEvent(new Event('change'));
  buildGrids(); // refresh active states
}

function setCb(id, val) {
  var cb = document.getElementById(id);
  if (!cb || cb.checked === val) return;
  cb.checked = val;
  cb.dispatchEvent(new Event('change'));
}

function toast(msg, ms) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(function(){ el.classList.remove('show'); }, ms || 2200);
}

function countVisible() {
  var count = 0;
  var sl = window._flare('stationsLayer'); if (sl && sl.visible) count++;
  var dl = window._flare('deptsLayer');    if (dl && dl.visible) count++;
  toast(count + ' field layer(s) visible');
}

function locateMe() {
  if (!navigator.geolocation) { toast('Geolocation not available'); return; }
  navigator.geolocation.getCurrentPosition(function(pos) {
    var v = window._flare('view'); if (!v) return;
    v.goTo({ center:[pos.coords.longitude, pos.coords.latitude], zoom:10 }, {duration:800});
  }, function(){ toast('Location unavailable'); });
}

var _isDark = true;
function toggleTheme() {
  _isDark = !_isDark;
  var v = window._flare('view');
  if (v && v.map) v.map.basemap = _isDark ? 'dark-gray-vector' : 'gray-vector';
  toast(_isDark ? 'Dark theme' : 'Light theme');
}

var _trayCollapsed = false;
function toggleTray() {
  _trayCollapsed = !_trayCollapsed;
  var tray   = document.getElementById('tray');
  var handle = document.getElementById('tray-handle');
  var label  = document.getElementById('tray-handle-text');
  tray.classList.toggle('collapsed', _trayCollapsed);
  handle.classList.toggle('open-state', _trayCollapsed);
  label.textContent = _trayCollapsed ? '▲  OPEN' : '▼ MENU';
}

function copyUrl() {
  var url = window.location.href;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(function(){ toast('URL copied'); });
  } else { toast('Copy: ' + url); }
}

function mobileClearAll() {
  ['cb-with','cb-without','cb-stations','cb-depts','cb-svi','cb-nri'].forEach(function(id){ setCb(id,false); });
  var v = window._flare('view'); if (v) v.goTo({extent:CONUS},{duration:750});
  buildGrids();
  toast('Reset');
}

// ── UPDATE HEADER KPI ──
function updateMobKpi() {
  var el = document.getElementById('mob-kpi');
  if (!el) return;
  var total = parseInt(document.getElementById('kpi-total') && document.getElementById('kpi-total').textContent) || 0;
  var k = document.getElementById('kpi-total');
  if (k) el.textContent = k.textContent + ' incidents';
}

// Poll KPI total every 3s once map loads
setInterval(function(){
  var k = document.getElementById('kpi-total');
  var el = document.getElementById('mob-kpi');
  if (k && el && k.textContent !== '—') el.textContent = k.textContent + ' incidents';
}, 3000);

// ── BUILD TRAY GRIDS ──
function buildGrids() {
  var track = document.getElementById('grid-track');
  track.innerHTML = '';

  LAYERS.forEach(function(slots, l) {
    var grid = document.createElement('div');
    grid.className = 'layer-grid';
    grid.style.setProperty('--layer-color', LAYER_COLORS[l]);

    var ci = 0;
    for (var pos = 0; pos < 9; pos++) {
      var btn = document.createElement('button');
      btn.className = 'btn';

      if (pos === 4) {
        btn.classList.add('map-btn');
        btn.textContent = 'MAP';
      } else if (pos === 6) {
        btn.classList.add('nav');
        btn.textContent = '⟵';
        if (l === 0) btn.disabled = true;
        btn.addEventListener('click', (function(li){ return function(){ goTo(li-1); }; })(l));
      } else if (pos === 8) {
        btn.classList.add('nav');
        btn.textContent = '⟶';
        if (l === LAYERS.length-1) btn.disabled = true;
        btn.addEventListener('click', (function(li){ return function(){ goTo(li+1); }; })(l));
      } else {
        var slot = slots[ci++];
        btn.classList.add('content');
        // reflect active state
        if (slot.toggle) {
          var cb = document.getElementById(slot.toggle);
          if (cb && cb.checked) btn.classList.add('on');
        }
        btn.innerHTML = slot.main + '<span class="btn-sub">' + slot.sub + '</span>';
        btn.addEventListener('click', (function(s){ return function(){ s.action(); buildGrids(); }; })(slot));
      }
      grid.appendChild(btn);
    }
    track.appendChild(grid);
  });

  // sync slide position
  document.getElementById('grid-track').style.transform = 'translateX(-' + (currentLayer*20) + '%)';
}

function goTo(layer) {
  if (layer < 0 || layer >= LAYERS.length) return;
  currentLayer = layer;
  document.getElementById('grid-track').style.transform = 'translateX(-' + (layer*20) + '%)';
  document.getElementById('depth-label').textContent = LAYER_NAMES[layer];
  document.getElementById('depth-label').style.color = LAYER_COLORS[layer];
}

function showHelp() {
  toast('← → navigate layers · tap buttons to toggle · MAP = center');
}

buildGrids();
goTo(0);
</script>

  <script>
    // ── THEME TOGGLE ──
    function toggleTheme() {
      const html = document.documentElement;
      const isLight = html.classList.toggle('light');
      localStorage.setItem('flare-theme', isLight ? 'light' : 'dark');
      document.getElementById('theme-toggle').textContent = isLight ? '🌙' : '☀️';
    }
    // restore
    if (localStorage.getItem('flare-theme') === 'light') {
      document.documentElement.classList.add('light');
      document.addEventListener('DOMContentLoaded', () => {
        const btn = document.getElementById('theme-toggle');
        if (btn) btn.textContent = '🌙';
      });
    }

    // ── MENU TOGGLE ──
    function toggleMenu() {
      const tray = document.getElementById('tray') || document.getElementById('left-wrap');
      const arrow = document.getElementById('tray-toggle-arrow');
      const menuBtn = document.getElementById('menu-toggle');
      if (!tray) return;
      const hidden = tray.classList.toggle('collapsed');
      localStorage.setItem('flare-menu-hidden', hidden ? '1' : '0');
      if (arrow) arrow.style.display = hidden ? 'flex' : 'none';
      if (menuBtn) menuBtn.textContent = hidden ? '▲' : '▼';
    }
    // restore
    if (localStorage.getItem('flare-menu-hidden') === '1') {
      document.addEventListener('DOMContentLoaded', () => {
        const tray = document.getElementById('tray') || document.getElementById('left-wrap');
        const arrow = document.getElementById('tray-toggle-arrow');
        const menuBtn = document.getElementById('menu-toggle');
        if (tray) tray.classList.add('collapsed');
        if (arrow) arrow.style.display = 'flex';
        if (menuBtn) menuBtn.textContent = '▲';
      });
    }
  </script>
